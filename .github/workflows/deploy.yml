name: Deploy to Google Cloud

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: pytest tests/ || true

  deploy-neo4j:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy Neo4j with Terraform
      run: |
        cd terraform
        terraform init
        terraform plan -var="project_id=$GCP_PROJECT_ID" -var="neo4j_password=$NEO4J_PASSWORD"
        terraform apply -auto-approve -var="project_id=$GCP_PROJECT_ID" -var="neo4j_password=$NEO4J_PASSWORD"

    - name: Get Neo4j connection details
      run: |
        cd terraform
        echo "BOLT_URL=$(terraform output -raw neo4j_bolt_url)" >> $GITHUB_ENV
        echo "BROWSER_URL=$(terraform output -raw neo4j_browser_url)" >> $GITHUB_ENV

    - name: Sync ontology to Neo4j
      run: |
        python3 src/neo4j_adapter.py sync           --uri $BOLT_URL           --password $NEO4J_PASSWORD           --graph memory/ontology/graph.jsonl
